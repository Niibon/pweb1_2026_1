<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <form action="/action_page.html">
        <fieldset>
        <legend>Sistema de Gestão Acadêmica</legend>
            <br>
            <h3>Mnautenção de Usuários do Sistema Interno</h3>
            <form>
                <label for="login">Login:</label><br>
                <input type="text" id="login" name="login"><br>
                <label for=senha">Senha:</label><br>
                <input type="text" id="senha" name="senha">

                <br>
                <h3>Status: </h3>
                <label for="status"></label>
                <select name="status" id="status">
                    <option value="ativo">Ativo</option>
                    <option value="inativo">Inativo</option>
                </select>

                    <h3>Curso:</h3>
                    <input type="radio" id="Tecnico" name="tipousuario" value="Tecnico">
                    <label for="Tecnico">Tecnico</label>
                    <input type="radio" id="Professor" name="tipousuario" value="Professor">
                    <label for="Professor">Professor</label>
                    <input type="radio" id="Aluno" name="tipousuario" value="aluno">
                    <label for="aluno">Aluno</label><br>
                
                <br>
                <label for="data"><h3>Data Criação:</h3></label>
                <input type="date" id="data" name="data">

                <h3>Perfil:</h3>
                    <input type="radio" id="Administrador" name="perfil" value="Administrador">
                    <label for="Administrador">Administrador</label>
                    <input type="radio" id="Convidade" name="perfil" value="Convidade">
                    <label for="Convidade">Convidade</label>
                
                <h3>Observações:</h3>
                    <label for="Observacao"></label>
                    <textarea id="Observacao" name="Observacao" rows="4" cols="50"></textarea>

                <h3>Linguagens de programação da sua preferência:</h3>
                    <input type="checkbox" id="Compras" name="modulo1" value="Compras">
                    <label for="modulo1"> Compras</label>
                    <input type="checkbox" id="Biblioteca" name="modulo2" value="Biblioteca">
                    <label for="modulo2"> Biblioteca</label>
                    <input type="checkbox" id="academico" name="modulo3" value="academico">
                    <label for="modulo3"> Acadêmica</label><br>
                    <input type="checkbox" id="Doc" name="modulo4" value="Doc">
                    <label for="modulo4"> Documentação</label>
                    <input type="checkbox" id="RH" name="modulo5" value="RH">
                    <label for="modulo5"> Recursos Humanos</label>
                <br>
                <br>
                <button>Salvar</button>
                <button>Excluir</button>
            </form>
        </fieldset>
</form>
</body>
</html>
